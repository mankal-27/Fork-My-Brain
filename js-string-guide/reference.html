<script>
const BADGE = {"static":"static","search":"search","transform":"copy","extract":"iter","build":"mutates","inspect":"other"};
const CATS  = [{"key":"all","label":"All"},{"key":"static","label":"Static"},{"key":"search","label":"Search"},{"key":"transform","label":"Transform"},{"key":"extract","label":"Extract"},{"key":"build","label":"Build"},{"key":"inspect","label":"Inspect"}];
const METHODS = [
  // ── Static ──
  {name:"String.fromCharCode()",cat:"static",summary:"Create string from Unicode values",desc:"Returns a string created from the specified sequence of UTF-16 code unit values. Each argument is a number (0–65535) representing a character code.",code:`String.fromCharCode(72, 101, 108, 108, 111);
// "Hello"
String.fromCharCode(9731); // "☃" (snowman)`,tip:"Use String.fromCodePoint() for emoji and characters outside the BMP."},
  {name:"String.fromCodePoint()",cat:"static",summary:"Create string from Unicode code points (supports emoji)",desc:"Like fromCharCode() but handles the full Unicode range including characters above U+FFFF (emoji, rare scripts).",code:`String.fromCodePoint(128512); // "😀"
String.fromCodePoint(65, 66, 67); // "ABC"`,tip:"Always prefer this over fromCharCode() when working with emoji or full Unicode."},
  {name:"String.raw()",cat:"static",summary:"Get raw string from a template literal (no escape processing)",desc:"Returns the raw string content of a template literal — backslash sequences like \\n are NOT interpreted.",code:`String.raw\`Hello\\nWorld\`; // "Hello\\nWorld"
// vs: \`Hello\\nWorld\`         // "Hello\nWorld" (newline!)

// Useful for Windows file paths:
String.raw\`C:\\Users\\mankal\`; // "C:\\Users\\mankal"`,tip:"Handy for regex patterns and Windows file paths where you don't want escape sequences processed."},
  // ── Search & check ──
  {name:".includes()",cat:"search",summary:"Check if a substring exists anywhere in the string",desc:"Returns true if the string contains the given substring. Case-sensitive. Accepts an optional start position.",code:`"fork-my-brain".includes("brain"); // true
"fork-my-brain".includes("Brain"); // false (case-sensitive)
"hello world".includes("world", 7); // false (start from index 7)`,tip:"Cleaner than indexOf() !== -1 when you only need a yes/no answer."},
  {name:".startsWith()",cat:"search",summary:"Check if string begins with a given value",desc:"Returns true if the string starts with the specified characters. Case-sensitive. Accepts an optional start position.",code:`"https://fork.dev".startsWith("https"); // true
"https://fork.dev".startsWith("http",  0); // true
"https://fork.dev".startsWith("fork",  8); // true`,tip:"Great for protocol checks (https://) and prefix validation."},
  {name:".endsWith()",cat:"search",summary:"Check if string ends with a given value",desc:"Returns true if the string ends with the specified characters. Case-sensitive. Accepts an optional end length.",code:`"image.png".endsWith(".png");   // true
"image.PNG".endsWith(".png");   // false
"image.png".endsWith("img", 5); // true (only look at first 5 chars)`,tip:"Perfect for file extension validation and URL suffix checks."},
  {name:".indexOf()",cat:"search",summary:"Find index of first occurrence, or -1",desc:"Returns the index of the first occurrence of the search string, or -1 if not found. Accepts an optional start position.",code:`"hello world".indexOf("world"); // 6
"hello world".indexOf("xyz");  // -1
"hello world".indexOf("l");    // 2
"hello world".indexOf("l", 4); // 9 (search from index 4)`,tip:"Use the second argument to find subsequent occurrences in a loop."},
  {name:".lastIndexOf()",cat:"search",summary:"Find index of LAST occurrence, or -1",desc:"Returns the index of the last occurrence of the search string, searching from right to left. Accepts an optional start position.",code:`"hello world hello".lastIndexOf("hello"); // 12
"hello world hello".lastIndexOf("hello", 5); // 0 (search up to index 5)
"hello".lastIndexOf("x"); // -1`,tip:"Use when you want the rightmost match — like getting the filename from a path."},
  {name:".match()",cat:"search",summary:"Match regex — returns array of matches or null",desc:"Matches the string against a regular expression. Without /g flag: returns first match + groups. With /g flag: returns all matches as a plain array (no groups). Returns null if no match.",code:`"test@example.com".match(/@(\\w+\\.\\w+)/);
// ["@example.com", "example.com"] — with group

"JS is great JS!".match(/JS/g);
// ["JS", "JS"] — all matches, no groups`,tip:"Use .matchAll() to get all matches WITH capture groups."},
  {name:".matchAll()",cat:"search",summary:"Match regex globally — returns iterator with groups",desc:"Returns an iterator of all matches including capture groups. Regex must have the /g flag.",code:`const text = "2024-01-15 and 2025-06-20";
const regex = /(\\d{4})-(\\d{2})-(\\d{2})/g;

for (const m of text.matchAll(regex)) {
  console.log(m[1], m[2], m[3]);
}
// "2024" "01" "15"
// "2025" "06" "20"`,tip:"Always use /g flag. Spread [...str.matchAll(re)] to get an array."},
  {name:".search()",cat:"search",summary:"Find index of first regex match, or -1",desc:"Tests for a match of a regular expression and returns the index of the first match, or -1.",code:`"Hello World".search(/world/i); // 6 (case-insensitive)
"Hello World".search(/xyz/);   // -1
"foo123bar".search(/\\d+/);    // 3`,tip:"Unlike indexOf(), search() accepts regex. But it can't start from a given index — use indexOf() for that."},
  // ── Transform ──
  {name:".toLowerCase()",cat:"transform",summary:"Convert entire string to lowercase",desc:"Returns a new string with all characters converted to lowercase. Does not mutate the original.",code:`"HELLO World".toLowerCase();  // "hello world"
"Ö".toLowerCase();           // "ö"

// Case-insensitive comparison:
"Hello".toLowerCase() === "hello".toLowerCase(); // true`,tip:"For locale-aware lowercase (e.g. Turkish), use .toLocaleLowerCase('tr')."},
  {name:".toUpperCase()",cat:"transform",summary:"Convert entire string to uppercase",desc:"Returns a new string with all characters converted to uppercase. Does not mutate the original.",code:`"hello world".toUpperCase();  // "HELLO WORLD"

// Detect ALL CAPS shouting:
const msg = "HELLO";
msg === msg.toUpperCase();    // true — it's all caps!`,tip:"For locale-aware uppercase (e.g. Turkish ı → İ), use .toLocaleUpperCase('tr')."},
  {name:".toLocaleLowerCase()",cat:"transform",summary:"Locale-aware lowercase",desc:"Like toLowerCase() but respects locale-specific case rules. Important for Turkish (ı/İ) and other languages with special casing.",code:`"ISTANBUL".toLocaleLowerCase("tr"); // "istanbul" (correct)
"ISTANBUL".toLowerCase();           // "istanbul" (same here)
"I".toLocaleLowerCase("tr");        // "ı" (dotless i!)`,tip:"Use when handling user-generated text from multiple languages."},
  {name:".toLocaleUpperCase()",cat:"transform",summary:"Locale-aware uppercase",desc:"Like toUpperCase() but respects locale-specific case rules.",code:`"istanbul".toLocaleUpperCase("tr"); // "İSTANBUL" (dotted İ)
"istanbul".toUpperCase();           // "ISTANBUL" (wrong for Turkish)`,tip:"Pair with Intl.Collator for fully locale-correct string comparison."},
  {name:".trim()",cat:"transform",summary:"Remove whitespace from both ends",desc:"Returns a new string with whitespace stripped from both the start and end. Whitespace includes spaces, tabs, newlines.",code:`"  hello world  ".trim();  // "hello world"
"\\n\\t hi \\n".trim();      // "hi"

// Common in form validation:
userInput.trim().length > 0; // check non-empty after trim`,tip:"Does NOT remove whitespace in the middle — use replace(/\\s+/g, ' ') for that."},
  {name:".trimStart()",cat:"transform",summary:"Remove whitespace from the START only",desc:"Removes whitespace from the beginning of the string only. Also known as .trimLeft() (deprecated alias).",code:`"  hello  ".trimStart(); // "hello  " (end space stays)
"\\n\\thello".trimStart(); // "hello"`,tip:"Useful when preserving indentation at the end but cleaning leading whitespace."},
  {name:".trimEnd()",cat:"transform",summary:"Remove whitespace from the END only",desc:"Removes whitespace from the end of the string only. Also known as .trimRight() (deprecated alias).",code:`"  hello  ".trimEnd(); // "  hello" (start space stays)
"hello\\n\\n".trimEnd(); // "hello"`,tip:"Common when reading file lines that have trailing newlines."},
  {name:".replace()",cat:"transform",summary:"Replace first (or regex) match with a new value",desc:"Returns a new string with the first occurrence of the pattern replaced. With a /g regex flag, replaces all. The replacement can be a string or a function.",code:`"Hello World".replace("World", "JS"); // "Hello JS"

// Replace first match only (no /g):
"aabbaa".replace("a", "x");   // "xabbaa"

// With regex — replace all vowels:
"hello".replace(/[aeiou]/g, "*"); // "h*ll*"

// Replace with a function:
"hello".replace(/\\w/g, c => c.toUpperCase()); // "HELLO"`,tip:"For simple all-match replacement of a string (not regex), use .replaceAll() — it's clearer."},
  {name:".replaceAll()",cat:"transform",summary:"Replace ALL occurrences of a string",desc:"Replaces every occurrence of the search string with the replacement. For regex, the /g flag is required.",code:`"aabbaa".replaceAll("a", "x"); // "xxbbxx"

"fork-my-brain".replaceAll("-", " "); // "fork my brain"

// With regex (must use /g):
"a1b2c3".replaceAll(/\\d/g, "#"); // "a#b#c#"`,tip:"Clearer than replace() with /g when replacing plain strings."},
  {name:".normalize()",cat:"transform",summary:"Return Unicode Normalization Form",desc:"Returns the Unicode Normalization Form of the string. Useful when comparing strings that may look the same but use different Unicode representations.",code:`// Two ways to write "é":
const a = "\\u00e9";         // precomposed  é
const b = "e\\u0301";        // decomposed   e + combining accent

a === b;             // false — different bytes!
a.normalize() === b.normalize(); // true`,tip:"Use NFC form (default) when storing to databases to avoid duplicates."},
  // ── Extract ──
  {name:".slice()",cat:"extract",summary:"Extract a substring by start/end index (supports negative)",desc:"Returns a portion of the string from start to end (end not included). Negative indices count from the end. Does NOT mutate.",code:`"Hello World".slice(6);      // "World"
"Hello World".slice(0, 5);   // "Hello"
"Hello World".slice(-5);     // "World"
"Hello World".slice(-5, -1); // "Worl"`,tip:"Prefer .slice() over .substring() — it handles negative indices and is more predictable."},
  {name:".substring()",cat:"extract",summary:"Extract a substring by start/end index (no negatives)",desc:"Like .slice() but swaps start and end if start > end, and treats negative values as 0.",code:`"Hello World".substring(6);      // "World"
"Hello World".substring(0, 5);   // "Hello"
"Hello World".substring(6, 0);   // "Hello" (args swapped!)
"Hello World".substring(-3);     // "Hello World" (treated as 0)`,tip:"Use .slice() instead — substring's auto-swap behaviour can cause subtle bugs."},
  {name:".at()",cat:"extract",summary:"Get character at index — supports negative indices",desc:"Returns the character at the specified index. Accepts negative integers (counting from the end). Similar to bracket notation but more expressive.",code:`"Hello".at(0);   // "H"
"Hello".at(-1);  // "o"  ← last character
"Hello".at(-2);  // "l"  ← second to last

// Old way:
const s = "Hello";
s[s.length - 1];
